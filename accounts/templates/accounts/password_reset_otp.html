<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Forgot password — enter OTP</title>
</head>
<body style="font-family:Arial;background:#f4f6f9;margin:0;padding:16px;box-sizing:border-box;">
<div style="box-sizing:border-box;width:100%;max-width:500px;margin:60px auto;background:#fff;padding:30px;border-radius:12px;">
    <h2 style="color:#1f3c88;">Enter OTP</h2>
    <p style="color:#444;">Step 3 of 4: Enter the 6-digit code from your SMS or email (both show the same code).</p>
    {% if messages %}
        {% for message in messages %}
            <p style="padding:10px;border-radius:6px;background:{% if message.tags == 'success' %}#e6f4ea{% else %}#fce8e6{% endif %};color:{% if message.tags == 'success' %}#137333{% else %}#b3261e{% endif %};">{{ message }}</p>
        {% endfor %}
    {% endif %}
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background:#1f3c88;color:#fff;padding:10px 16px;border:none;border-radius:6px;">Verify</button>
    </form>
    <form method="post" style="margin-top:12px;">
        {% csrf_token %}
        <input type="hidden" name="resend" value="1">
        <button type="submit" style="background:#666;color:#fff;padding:8px 14px;border:none;border-radius:6px;">Resend OTP</button>
    </form>
    <p style="margin-top:18px;"><a href="{% url 'login' %}">Back to login</a></p>
</div>
</body>
</html>
