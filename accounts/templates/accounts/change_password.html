<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Change Password</title>
    <style>
        body { font-family: Arial, sans-serif; background:#f4f6f9; margin:0; padding:0 16px 24px; box-sizing:border-box; }
        .container { width:100%; max-width:500px; margin:50px auto; background:#fff; padding:30px; border-radius:12px; box-shadow:0 2px 12px rgba(0,0,0,0.08); box-sizing:border-box; }
        h2 { color:#1f3c88; margin-top:0; }
        .row { margin-bottom:16px; }
        label { display:block; margin-bottom:6px; font-weight:bold; }
        input { width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box; }
        .btn { background:#1f3c88; color:#fff; border:none; padding:12px 18px; border-radius:6px; cursor:pointer; }
        .errorlist { color:red; margin:6px 0; padding-left:18px; }
    </style>
</head>
<body>
<div class="container">
    <h2>Change Password</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Update Password</button>
    </form>
</div>
</body>
</html>
